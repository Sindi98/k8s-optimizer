name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend · lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check backend/app backend/tests backend/conftest.py
      - name: Pytest
        run: pytest

  frontend:
    name: Frontend · JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Compile-check dashboard JS
        run: |
          node -e '
            const fs = require("fs"), vm = require("vm");
            const html = fs.readFileSync("frontend/index.html", "utf8");
            const m = [...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
            if (!m.length) { console.error("no <script> blocks found"); process.exit(1); }
            new vm.Script(m[m.length - 1][1]);   // compile-only: throws on bad JS
            console.log("dashboard JS compiles (" + m.length + " script blocks)");
          '

  image:
    name: Image · docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: kube-optimizer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
