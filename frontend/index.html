<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; }

  /* ---------- shell ---------- */
  .app { max-width: 1240px; margin: 0 auto; padding: 0 28px 80px; }

  header.top {

    gap: 24px; padding: 30px 0 22px; flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 30;
    background: linear-gradient(var(--ink) 72%, rgba(21,17,15,0));
    backdrop-filter: blur(2px);
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 {
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 34px;
    letter-spacing: 0.5px; color: var(--text); line-height: 1;
  }
  .brand h1 .dot { color: var(--wine); }
  .brand .tag {
    font-size: 12px; color: var(--muted); letter-spacing: 0.14em;
    text-transform: uppercase; padding-bottom: 4px;
  }
  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .ctl { display: flex; flex-direction: column; gap: 5px; }
  .ctl label {
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted-2);
  }
  select, button, input {
    font-family: inherit; font-size: 13px; color: var(--text);
  }
  select, .chip, .btn {
    background: var(--ink-2); border: 1px solid var(--line);
    border-radius: 9px; padding: 9px 13px; height: 38px;
  }
  select { cursor: pointer; min-width: 168px; appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239C8F86' fill='none' stroke-width='1.4'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 12px center; padding-right: 30px; }
  select:hover { border-color: rgba(217,194,163,0.24); }
  .btn { display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    transition: background .15s, border-color .15s, color .15s; white-space: nowrap; }
  .btn:hover { background: var(--ink-hover); border-color: rgba(217,194,163,0.22); }
  .btn.primary { background: var(--wine-deep); border-color: transparent; color: #FBEFEF; font-weight: 600; }
  .btn.primary:hover { background: #7d2f3e; }
  .btn[disabled] { opacity: .5; cursor: not-allowed; }

  .health { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted);
    padding: 0 4px; height: 38px; }
  .health .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 0 0 rgba(95,168,139,.5); animation: pulse 2.4s infinite; }
  .health.demo .pulse { background: var(--champagne); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(95,168,139,.45)} 70%{box-shadow:0 0 0 7px rgba(95,168,139,0)} 100%{box-shadow:0 0 0 0 rgba(95,168,139,0)} }

  /* ---------- summary ---------- */
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 26px 0 22px; }
  .card { background: var(--ink-2); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 20px 17px; position: relative; overflow: hidden; }
  .card .klabel { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px; }
  .card .kval { font-family: 'Fraunces', serif; font-weight: 500; font-size: 38px; line-height: 1; }
  .card .ksub { font-size: 12px; color: var(--muted); margin-top: 9px; }
  .card.hero .kval { color: var(--wine); }
  .card.hero::after { content:""; position:absolute; right:-30px; bottom:-30px; width:120px; height:120px;
    border-radius:50%; background: radial-gradient(circle, rgba(178,74,87,0.12), transparent 70%); }
  .card .kval .unit { font-size: 18px; color: var(--muted); font-family:'JetBrains Mono',monospace; margin-left: 3px; }
  .pill-row { display: flex; gap: 6px; margin-top: 11px; flex-wrap: wrap; }
  .pill { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--line);
    display: inline-flex; align-items: center; gap: 6px; }
  .pill .d { width: 6px; height: 6px; border-radius: 50%; }
  .d.crit{background:var(--crit)} .d.warn{background:var(--warn)} .d.ok{background:var(--ok)} .d.info{background:var(--info)}

  /* ---------- toolbar ---------- */
  .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 14px;
    margin-bottom: 12px; flex-wrap: wrap; }
  .segmented { display: inline-flex; background: var(--ink-2); border: 1px solid var(--line);
    border-radius: 9px; padding: 3px; }
  .segmented button { background: transparent; border: none; color: var(--muted);
    padding: 6px 13px; border-radius: 6px; cursor: pointer; font-size: 12.5px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 7px; }
  .segmented button.on { background: var(--ink-hover); color: var(--text); }
  .segmented button .count { color: var(--muted-2); font-family:'JetBrains Mono',monospace; font-size: 11px; }
  .search { position: relative; }
  .search input { background: var(--ink-2); border: 1px solid var(--line); border-radius: 9px;
    height: 38px; padding: 0 13px 0 34px; width: 230px; }
  .search input::placeholder { color: var(--muted-2); }
  .search svg { position: absolute; left: 11px; top: 11px; }

  /* ---------- table ---------- */
  .panel { background: var(--ink-2); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted-2); font-weight: 600; padding: 13px 16px; border-bottom: 1px solid var(--line);
    background: rgba(0,0,0,0.12); }
  thead th.num { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--line-soft); cursor: pointer; transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--ink-3); }
  tbody tr.sel { background: var(--ink-3); box-shadow: inset 3px 0 0 var(--wine); }
  td { padding: 13px 16px; vertical-align: middle; }
  td.num { text-align: right; }
  .sevcell { width: 30px; padding-left: 18px; }
  .sevdot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .sevdot.crit{background:var(--crit); box-shadow:0 0 9px rgba(209,86,75,.5)}

  .podname { font-weight: 600; font-size: 13.5px; }

  .qos { font-family:'JetBrains Mono',monospace; font-size: 10.5px; padding: 1px 6px; border-radius: 4px;

  /* request-vs-reality bar (the signature element) */

  .rvr .nums .used { color: var(--text); }
  .rvr .nums .req { color: var(--muted-2); }
  .bar { position: relative; height: 8px; background: var(--track); border-radius: 5px; overflow: visible; }
  .bar .fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 5px; }
  .bar .fill.ok   { background: linear-gradient(90deg, #4d9479, var(--ok)); }
  .bar .fill.warn { background: linear-gradient(90deg, #b07d3c, var(--warn)); }
  .bar .fill.crit { background: linear-gradient(90deg, #b8443a, var(--crit)); }
  .bar .reqtick { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--champagne);
    border-radius: 2px; opacity: .85; }
  .bar .reqtick::after { content:""; }
  .throttle { font-family:'JetBrains Mono',monospace; font-size: 12px; }
  .throttle.bad { color: var(--crit); font-weight: 600; }
  .badge-oom { font-size: 10px; color: var(--crit); border: 1px solid rgba(209,86,75,.4);
    padding: 1px 6px; border-radius: 4px; }
  .reclaim { font-family:'JetBrains Mono',monospace; font-size: 12.5px; color: var(--champagne); }
  .reclaim.zero { color: var(--muted-2); }
  .chev { color: var(--muted-2); }

  /* ---------- drawer ---------- */
  .scrim { position: fixed; inset: 0; background: rgba(8,6,5,0.55); opacity: 0; pointer-events: none;
    transition: opacity .2s; z-index: 40; backdrop-filter: blur(1px); }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; height: 100%; width: 520px; max-width: 94vw;
    background: var(--ink-2); border-left: 1px solid var(--line); box-shadow: var(--shadow);
    transform: translateX(100%); transition: transform .26s cubic-bezier(.2,.7,.2,1); z-index: 50;
    display: flex; flex-direction: column; }
  .drawer.open { transform: translateX(0); }
  .drawer .dhead { padding: 22px 24px 18px; border-bottom: 1px solid var(--line); position: relative; }
  .drawer .dhead h2 { font-family:'JetBrains Mono',monospace; font-weight: 600; font-size: 16px; word-break: break-all; }
  .drawer .dhead .dsub { color: var(--muted); font-size: 12.5px; margin-top: 7px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .close { position: absolute; top: 18px; right: 18px; background: var(--ink-3); border: 1px solid var(--line);
    width: 30px; height: 30px; border-radius: 8px; color: var(--muted); cursor: pointer; font-size: 16px; }
  .close:hover { color: var(--text); background: var(--ink-hover); }
  .dbody { overflow-y: auto; padding: 20px 24px 30px; flex: 1; }
  .cblock { border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 16px; background: rgba(0,0,0,0.1); }
  .cblock h3 { font-family:'JetBrains Mono',monospace; font-size: 13.5px; margin-bottom: 12px; display:flex; align-items:center; gap:8px;}
  .issue { display: flex; gap: 10px; padding: 9px 0; border-top: 1px solid var(--line-soft); font-size: 13px; }
  .issue:first-of-type { border-top: none; }
  .issue .ic { flex: 0 0 auto; width: 7px; height: 7px; border-radius: 50%; margin-top: 7px; }
  .issue .it { font-weight: 600; }
  .issue .id { color: var(--muted); }
  .recgrid { display: grid; grid-template-columns: auto 1fr 1fr; gap: 7px 14px; margin: 14px 0 4px;
    font-family:'JetBrains Mono',monospace; font-size: 12px; align-items: baseline; }
  .recgrid .rh { color: var(--muted-2); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; }
  .recgrid .cur { color: var(--muted); }
  .recgrid .arrow { color: var(--wine); }
  .recgrid .new { color: var(--ok); }
  pre.yaml { background: #100C0A; border: 1px solid var(--line); border-radius: 9px; padding: 13px 14px;
    font-family:'JetBrains Mono',monospace; font-size: 12px; color: #d8cfc6; overflow-x: auto; margin-top: 12px;
    position: relative; line-height: 1.55; }
  pre.yaml .k { color: var(--champagne); } pre.yaml .v { color: #9ec7b3; } pre.yaml .c { color: var(--muted-2); }

  /* ---------- report modal ---------- */
  .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;

  .modal.open { display: flex; }
  .modal .mbg { position: absolute; inset: 0; background: rgba(8,6,5,0.62); backdrop-filter: blur(2px); }
  .mcard { position: relative; background: var(--ink-2); border: 1px solid var(--line); border-radius: 16px;

  .mcard .mhead .actions { display:flex; gap: 10px; align-items:center; }
  .provtag { font-size: 11px; color: var(--muted); font-family:'JetBrains Mono',monospace;

  .mbody { overflow-y: auto; padding: 8px 28px 28px; }

  /* rendered markdown */
  .md h1 { font-family:'Fraunces',serif; font-weight:500; font-size: 24px; margin: 22px 0 10px; }
  .md h2 { font-family:'Fraunces',serif; font-weight:500; font-size: 19px; margin: 24px 0 8px; color: var(--text); }
  .md h3 { font-family:'JetBrains Mono',monospace; font-size: 14px; margin: 18px 0 6px; color: var(--champagne); }
  .md p { margin: 8px 0; color: #ddd4cc; }
  .md ul { margin: 8px 0 8px 4px; list-style: none; }
  .md li { padding: 3px 0 3px 18px; position: relative; color: #ddd4cc; }
  .md li::before { content:"–"; position:absolute; left:2px; color: var(--wine); }
  .md strong { color: var(--text); font-weight: 700; }
  .md code { font-family:'JetBrains Mono',monospace; font-size: 12.5px; background: var(--ink-3);
    padding: 1px 5px; border-radius: 4px; color: var(--champagne); }
  .md blockquote { border-left: 2px solid var(--warn); padding: 4px 14px; margin: 10px 0; color: var(--muted);
    background: rgba(206,146,72,0.06); border-radius: 0 8px 8px 0; }
  .md pre { background:#100C0A; border:1px solid var(--line); border-radius:9px; padding:13px 14px;
    overflow-x:auto; margin: 10px 0; }
  .md pre code { background: none; padding: 0; color: #d8cfc6; line-height: 1.55; }
  .md em { color: var(--muted); font-style: italic; }

  /* ---------- states ---------- */
  .state { padding: 70px 20px; text-align: center; color: var(--muted); }
  .state .spin { width: 26px; height: 26px; border: 2.5px solid var(--line); border-top-color: var(--wine);
    border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: var(--crit); }

  @media (max-width: 860px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .rvr { width: 120px; }
    thead th.hide, td.hide { display: none; }
  }
</style>

    const bar = el("div", "bar");
    const fill = el("div", "fill " + cls); fill.style.width = usedPct + "%"; bar.appendChild(fill);
    if (reqPct != null) { const t = el("div", "reqtick"); t.style.left = reqPct + "%"; t.title = "richiesta"; bar.appendChild(t); }
    wrap.appendChild(bar);
    return wrap;
  }

  function podRow(p) {
    const tr = el("tr"); tr.dataset.pod = p.name;
    if (state.selected === p.name) tr.classList.add("sel");

    const sev = el("td", "sevcell");
    sev.appendChild(el("span", "sevdot " + p.severity));
    tr.appendChild(sev);

    const name = el("td");
    name.appendChild(el("div", "podname", p.name));
    const meta = el("div", "podmeta");
    meta.innerHTML = (p.qos_class ? "<span class='qos'>" + p.qos_class + "</span> " : "") +
      (p.node ? "· " + p.node : "");
    name.appendChild(meta);
    tr.appendChild(name);

    // aggregate first container for the row bars (detail shows all)
    const c0 = p.containers[0] || { spec: {}, usage: {} };
    const cpuTd = el("td"); cpuTd.appendChild(barFor(c0.spec, c0.usage, "cpu")); tr.appendChild(cpuTd);
    const memTd = el("td", "hide"); memTd.appendChild(barFor(c0.spec, c0.usage, "mem")); tr.appendChild(memTd);

    const thr = el("td", "num hide");
    const tv = Math.round((c0.usage.cpu_throttle || 0) * 100);
    thr.innerHTML = "<span class='throttle " + (tv >= 25 ? "bad" : "") + "'>" + tv + "%</span>";
    tr.appendChild(thr);

    const rs = el("td", "num");
    let rsh = "<span class='mono'>" + (p.restarts || 0) + "</span>";
    if (p.oom_killed) rsh += " <span class='badge-oom'>OOM</span>";
    rs.innerHTML = rsh; tr.appendChild(rs);

    const rec = el("td", "num");
    const hasReclaim = p.reclaimable_cpu_m || p.reclaimable_mem_mi;
    const parts = [];
    if (p.reclaimable_cpu_m) parts.push(p.reclaimable_cpu_m + "m");
    if (p.reclaimable_mem_mi) parts.push(formatMi(p.reclaimable_mem_mi));
    rec.innerHTML = "<span class='reclaim " + (hasReclaim ? "" : "zero") + "'>" + (hasReclaim ? parts.join(" · ") : "—") + "</span>";
    tr.appendChild(rec);

    const chev = el("td", "chev", "›"); tr.appendChild(chev);
    tr.addEventListener("click", () => openDrawer(p.name));
    return tr;
  }

  function formatMi(mi) {
    if (mi >= 1024) return (mi / 1024).toFixed(mi % 1024 ? 1 : 0).replace(/\.0$/, "") + "Gi";
    return mi + "Mi";
  }

  function renderTable() {
    const a = state.analysis;
    const wrap = $("#tablewrap");
    wrap.innerHTML = "";
    let pods = a.pods.slice();
    if (state.filter !== "all") pods = pods.filter((p) => p.severity === state.filter);
    if (state.search) { const q = state.search.toLowerCase(); pods = pods.filter((p) => p.name.toLowerCase().includes(q)); }

    if (!pods.length) { wrap.appendChild(el("div", "state", "Nessun pod corrisponde ai filtri.")); return; }

    const table = el("table");
    table.innerHTML =
      "<thead><tr><th class='sevcell'></th><th>Pod</th><th>CPU · uso / richiesta</th>" +
      "<th class='hide'>Memoria · uso / richiesta</th><th class='num hide'>Throttle</th>" +
      "<th class='num'>Restart</th><th class='num'>Recuperabile</th><th></th></tr></thead>";
    const tb = el("tbody");
    pods.forEach((p) => tb.appendChild(podRow(p)));
    table.appendChild(tb);
    wrap.appendChild(table);
  }

  function renderSummary() {
    const s = state.analysis.summary;
    const c = $("#summary"); c.innerHTML = "";
    const cards = [
      { cls: "card hero", label: "CPU recuperabile", val: bigSplit(s.reclaimable_cpu_label),
        sub: s.cpu_savings_pct + "% del CPU richiesto nel namespace" },
      { cls: "card hero", label: "Memoria recuperabile", val: bigSplit(s.reclaimable_mem_label),
        sub: s.mem_savings_pct + "% della memoria richiesta" },
      { cls: "card", label: "Da ottimizzare", val: (s.counts.critical + s.counts.warning) + "",
        pills: true },
      { cls: "card", label: "Pod analizzati", val: s.pods_total + "",
        sub: "finestra " + state.analysis.window },
    ];
    cards.forEach((cd) => {
      const e = el("div", cd.cls);
      e.appendChild(el("div", "klabel", cd.label));
      e.appendChild(el("div", "kval", cd.val));
      if (cd.pills) {
        const pr = el("div", "pill-row");
        [["crit", s.counts.critical, "critici"], ["warn", s.counts.warning, "da rivedere"], ["ok", s.counts.ok, "ok"]]
          .forEach(([k, n, lbl]) => pr.appendChild(el("span", "pill", "<span class='d " + k + "'></span>" + n + " " + lbl)));
        e.appendChild(pr);
      } else if (cd.sub) {
        e.appendChild(el("div", "ksub", cd.sub));
      }
      c.appendChild(e);
    });
  }
  function bigSplit(label) {
    const m = String(label).match(/^([\d.]+)(\D+)$/);
    if (!m) return label;
    return m[1] + "<span class='unit'>" + m[2] + "</span>";
  }

  function renderFilters() {
    const counts = state.analysis.summary.counts;
    const f = $("#filters"); f.innerHTML = "";
    const total = state.analysis.summary.pods_total;
    const items = [["all", "Tutti", total]].concat(SEV.map((s) => [s, SEV_LABEL[s], counts[s]]));
    items.forEach(([key, lbl, n]) => {
      if (key !== "all" && !n) return;
      const b = el("button", state.filter === key ? "on" : "");
      b.innerHTML = (key === "all" ? "" : "<span class='d " + key + "'></span>") + lbl + " <span class='count'>" + n + "</span>";
      b.onclick = () => { state.filter = key; renderFilters(); renderTable(); };
      f.appendChild(b);
    });
  }

  // ---- drawer ----
  function openDrawer(podName) {
    const p = state.analysis.pods.find((x) => x.name === podName);
    if (!p) return;
    state.selected = podName; renderTable();
    $("#dtitle").textContent = p.name;
    const sub = $("#dsub"); sub.innerHTML = "";
    sub.appendChild(el("span", "qos", p.qos_class || "n/d"));
    if (p.node) sub.appendChild(el("span", null, "· " + p.node));
    if (p.restarts) sub.appendChild(el("span", null, "· " + p.restarts + " restart"));
    if (p.oom_killed) sub.appendChild(el("span", "badge-oom", "OOMKilled"));

    const body = $("#dbody"); body.innerHTML = "";
    p.containers.forEach((c) => body.appendChild(containerBlock(c)));
    $("#scrim").classList.add("open"); $("#drawer").classList.add("open");
  }
  function closeDrawer() {
    $("#scrim").classList.remove("open"); $("#drawer").classList.remove("open");
    state.selected = null; renderTable();
  }

  function containerBlock(c) {
    const b = el("div", "cblock");
    b.appendChild(el("h3", null, "<span class='sevdot " + c.severity + "'></span>" + c.name));

    if (!c.issues.length) {
      b.appendChild(el("div", "ok-empty", "✓ Risorse ben dimensionate, nessun intervento necessario."));
      return b;
    }
    c.issues.forEach((i) => {
      const row = el("div", "issue");
      const ic = el("span", "ic"); ic.style.background = "var(--" + (i.severity === "critical" ? "crit" : i.severity === "warning" ? "warn" : "info") + ")";
      row.appendChild(ic);
      row.appendChild(el("div", null, "<span class='it'>" + i.title + "</span><br><span class='id'>" + i.detail + "</span>"));
      b.appendChild(row);
    });

    // current -> recommended
    const sp = c.spec, rc = c.recommendation;
    const g = el("div", "recgrid");
    g.innerHTML =
      "<span class='rh'></span><span class='rh'>Attuale</span><span class='rh'>Consigliato</span>" +
      rowRec("CPU req", sp.cpu_request_label, rc.cpu_request_label) +
      rowRec("CPU lim", sp.cpu_limit_label, rc.cpu_limit_label) +
      rowRec("Mem req", sp.mem_request_label, rc.mem_request_label) +
      rowRec("Mem lim", sp.mem_limit_label, rc.mem_limit_label);
    b.appendChild(g);

    // yaml
    const changed = rc.cpu_request_label !== sp.cpu_request_label || rc.cpu_limit_label !== sp.cpu_limit_label ||
      rc.mem_request_label !== sp.mem_request_label || rc.mem_limit_label !== sp.mem_limit_label;
    if (changed) b.appendChild(yamlSnippet(c));
    return b;
  }
  function rowRec(label, cur, neu) {
    const same = cur === neu;
    return "<span class='cur' style='color:var(--muted-2)'>" + label + "</span>" +
      "<span class='cur'>" + cur + "</span>" +
      (same ? "<span class='cur'>" + neu + "</span>"
            : "<span class='new'>" + neu + " <span class='arrow'>←</span></span>");
  }
  function yamlSnippet(c) {
    const rc = c.recommendation;
    const txt =
`resources:
  requests:
    cpu: ${rc.cpu_request_label}
    memory: ${rc.mem_request_label}
  limits:
    cpu: ${rc.cpu_limit_label}
    memory: ${rc.mem_limit_label}`;
    const pre = el("pre", "yaml");
    pre.innerHTML = txt
      .replace(/(resources|requests|limits|cpu|memory):/g, "<span class='k'>$1</span>:")
      .replace(/: (\S+)/g, ": <span class='v'>$1</span>");
    const btn = el("button", "copy", "Copia");
    btn.onclick = () => { navigator.clipboard.writeText(txt); btn.textContent = "Copiato ✓"; setTimeout(() => btn.textContent = "Copia", 1400); };
    pre.appendChild(btn);
    return pre;
  }

  // ---- report ----
  let lastReportMd = "";
  async function genReport() {
    const btn = $("#genreport"); const orig = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = "Generazione…";
    $("#modal").classList.add("open");
    $("#reportmd").innerHTML = "<div class='state'><div class='spin'></div>Il modello sta analizzando i risultati…</div>";
    try {
      const res = await loadReport(state.ns);
      lastReportMd = res.markdown || "";
      $("#provtag").textContent = (res.fallback ? "fallback · " : "") + (res.provider || "");
      $("#reportmd").innerHTML = renderMarkdown(lastReportMd);
      if (res.error && !res.fallback) $("#reportmd").innerHTML = "<div class='state err'>" + res.error + "</div>";
    } catch (e) {
      $("#reportmd").innerHTML = "<div class='state err'>Errore generazione report: " + e.message + "</div>";
    } finally { btn.disabled = false; btn.innerHTML = orig; }
  }

  // minimal, dependency-free markdown renderer
  function renderMarkdown(md) {
    const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const lines = md.split("\n");
    let html = "", inUl = false, inCode = false, codeBuf = [];
    const flushUl = () => { if (inUl) { html += "</ul>"; inUl = false; } };
    const inline = (t) => esc(t)
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g, "<code>$1</code>");
    for (let raw of lines) {
      if (raw.trim().startsWith("```")) {
        if (!inCode) { inCode = true; codeBuf = []; flushUl(); }
        else { inCode = false; html += "<pre><code>" + esc(codeBuf.join("\n")) + "</code></pre>"; }
        continue;
      }
      if (inCode) { codeBuf.push(raw); continue; }
      if (/^### /.test(raw)) { flushUl(); html += "<h3>" + inline(raw.slice(4)) + "</h3>"; }
      else if (/^## /.test(raw)) { flushUl(); html += "<h2>" + inline(raw.slice(3)) + "</h2>"; }
      else if (/^# /.test(raw)) { flushUl(); html += "<h1>" + inline(raw.slice(2)) + "</h1>"; }
      else if (/^> /.test(raw)) { flushUl(); html += "<blockquote>" + inline(raw.slice(2)) + "</blockquote>"; }
      else if (/^[-*] /.test(raw)) { if (!inUl) { html += "<ul>"; inUl = true; } html += "<li>" + inline(raw.slice(2)) + "</li>"; }
      else if (/^_.*_$/.test(raw.trim()) && raw.trim().length > 2) { flushUl(); html += "<p><em>" + inline(raw.trim().slice(1, -1)) + "</em></p>"; }
      else if (raw.trim() === "") { flushUl(); }
      else { flushUl(); html += "<p>" + inline(raw) + "</p>"; }
    }
    flushUl();
    return html;
  }

  function downloadReport() {
    const blob = new Blob([lastReportMd], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "report-ottimizzazione-" + state.ns + ".md"; a.click();
    URL.revokeObjectURL(url);
  }

  // ---- orchestration ----
  async function selectNamespace(ns) {
    state.ns = ns; state.selected = null;
    $("#tablewrap").innerHTML = "<div class='state'><div class='spin'></div>Analisi di <b>" + ns + "</b>…</div>";
    try {
      state.analysis = await loadAnalysis(ns);
      renderSummary(); renderFilters(); renderTable();
    } catch (e) {
      $("#tablewrap").innerHTML = "<div class='state err'>Analisi fallita: " + e.message + "</div>";
    }
  }

  async function init() {
    await loadHealth();
    const h = $("#health"), txt = $("#healthtxt");
    if (state.live) { txt.textContent = "Live · " + (state.health.llm_provider || "—"); }
    else { h.classList.add("demo"); txt.textContent = "Demo · " + (state.health.llm_provider || "mock"); }

    const namespaces = await loadNamespaces();
    const sel = $("#ns"); sel.innerHTML = "";
    namespaces.forEach((n) => { const o = el("option"); o.value = n; o.textContent = n; sel.appendChild(o); });
    sel.onchange = () => selectNamespace(sel.value);

    if (namespaces.length) await selectNamespace(namespaces[0]);
    else $("#tablewrap").innerHTML = "<div class='state'>Nessun namespace disponibile.</div>";
  }

  // events
  $("#refresh").onclick = () => state.ns && selectNamespace(state.ns);
  $("#genreport").onclick = genReport;
  $("#dclose").onclick = closeDrawer;
  $("#scrim").onclick = closeDrawer;
  $("#mclose").onclick = () => $("#modal").classList.remove("open");
  $("#mbg").onclick = () => $("#modal").classList.remove("open");
  $("#dlreport").onclick = downloadReport;
  $("#search").addEventListener("input", (e) => { state.search = e.target.value; renderTable(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeDrawer(); $("#modal").classList.remove("open"); } });

  init();
})();
</script>
</body>
</html>
