# ──────────────────────────────────────────────────────────────────────────
# Reclaim · Kube Optimizer — DEMO su Docker Desktop (Kubernetes)
#
# Pensato per un cluster Kubernetes di Docker Desktop con una registry locale su
#   host.docker.internal:5050
#
# Modalità LIVE: analizza i pod reali del cluster (RBAC in sola lettura) usando
# il Prometheus della demo (k8s/prometheus-demo.yaml). Tutta la configurazione
# — provider LLM, soglie, endpoint, finestra — è poi modificabile dalla UI
# ("⚙ Configura") e viene salvata sul volume persistente montato in /data.
#
# Deploy completo automatizzato:   ./scripts/demo-deploy.sh
# Oppure a mano:
#   kubectl apply -f k8s/prometheus-demo.yaml
#   kubectl apply -f k8s/demo-docker-desktop.yaml
#   kubectl -n kube-optimizer rollout status deploy/kube-optimizer
#   kubectl -n kube-optimizer port-forward svc/kube-optimizer 8080:80
#   # apri http://localhost:8080
# ──────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: kube-optimizer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-optimizer
  namespace: kube-optimizer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-optimizer-readonly
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-optimizer-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-optimizer-readonly
subjects:
  - kind: ServiceAccount
    name: kube-optimizer
    namespace: kube-optimizer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kube-optimizer-config
  namespace: kube-optimizer
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-optimizer
  namespace: kube-optimizer
  labels:
    app: kube-optimizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-optimizer
  template:
    metadata:
      labels:
        app: kube-optimizer
    spec:
      serviceAccountName: kube-optimizer
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # Immagine sulla registry locale di Docker Desktop.
          # host.docker.internal risolve sia dall'host (docker push) sia da
          # dentro il cluster (pull del kubelet).
          image: host.docker.internal:5050/kube-optimizer:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # LIVE: analizza il cluster reale, non i dati sintetici.
            - name: DEMO_MODE
              value: "false"
            - name: IN_CLUSTER
              value: "true"
            # Prometheus della demo (k8s/prometheus-demo.yaml).
            - name: PROMETHEUS_URL
              value: "http://prometheus.monitoring.svc:9090"
            # Finestra breve: la demo mostra dati pochi minuti dopo l'avvio.
            - name: ANALYSIS_WINDOW
              value: "1h"
            # Provider AI di default: locale, zero chiamate esterne.
            # Cambia provider/modello/chiavi dalla UI ("⚙ Configura").
            - name: LLM_PROVIDER
              value: "mock"
            - name: REPORT_LANGUAGE
              value: "it"
            # Config modificata dalla UI: salvata sul volume persistente.
            - name: CONFIG_PATH
              value: "/data/config.json"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
          volumeMounts:
            - name: config
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: kube-optimizer-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kube-optimizer
  namespace: kube-optimizer
spec:
  selector:
    app: kube-optimizer
  ports:
    - name: http
      port: 80
      targetPort: 8080
