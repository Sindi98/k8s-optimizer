# ──────────────────────────────────────────────────────────────────────────
# Namespace di DEMO con workload dai parametri di utilizzo SBAGLIATI, pensato
# per testare l'optimizer end-to-end (namespace: demo-apps).
#
# Come Prometheus "vede" questi pod:
#   • USO DELLE RISORSE (ciò che l'optimizer analizza) → da cAdvisor, che il
#     Prometheus della demo (k8s/prometheus-demo.yaml) raccoglie per OGNI pod
#     del cluster. Non serve nessuna annotazione perché l'optimizer funzioni.
#   • METRICHE APPLICATIVE → i pod possono essere "abilitati a Prometheus" con
#     le annotazioni prometheus.io/scrape. Qui `node-exporter` espone davvero
#     /metrics ed è scrapato grazie al job kubernetes-pods di prometheus-demo.
#
# Ogni workload innesca un tipo di rilevazione:
#   overprovisioned-web → CPU/memoria sovradimensionate (+ inattivo)
#   cpu-throttled       → CPU in throttling (limite troppo basso)
#   memory-pressure     → rischio OOM (uso vicino al limite di memoria)
#   besteffort-worker   → requests/limits assenti (QoS BestEffort)
#   node-exporter       → sovradimensionato + inattivo, ed è un target
#                         Prometheus reale (annotazioni prometheus.io/scrape)
#
#   kubectl apply -f k8s/demo-workloads.yaml          # oppure: make demo-workloads
#
# Attendi 3-5 minuti che Prometheus raccolga campioni, poi seleziona "demo-apps"
# nella dashboard. Con finestre brevi (es. 15m, da "⚙ Configura") i risultati
# arrivano prima.
# ──────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: demo-apps
  labels:
    app.kubernetes.io/part-of: reclaim-demo
---
# 1) Sovradimensionato + inattivo: chiede 500m CPU / 512Mi ma resta praticamente
#    fermo (nginx idle usa ~2m CPU e ~10Mi). → CPU e memoria recuperabili.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overprovisioned-web
  namespace: demo-apps
  labels: { app: overprovisioned-web }
spec:
  replicas: 1
  selector:
    matchLabels: { app: overprovisioned-web }
  template:
    metadata:
      labels: { app: overprovisioned-web }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
# 2) CPU in throttling: due worker di calcolo contro un limite di 100m.
#    → throttling vicino al 95%, segnalato come problema di affidabilità.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-throttled
  namespace: demo-apps
  labels: { app: cpu-throttled }
spec:
  replicas: 1
  selector:
    matchLabels: { app: cpu-throttled }
  template:
    metadata:
      labels: { app: cpu-throttled }
    spec:
      containers:
        - name: stress
          image: polinux/stress:latest
          command: ["stress"]
          args: ["--cpu", "2"]
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
# 3) Rischio OOM: tiene ~234Mi residenti contro un limite di 256Mi (~91%).
#    Sopra la soglia di rischio (90%) ma con margine per non andare in OOMKill.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-pressure
  namespace: demo-apps
  labels: { app: memory-pressure }
spec:
  replicas: 1
  selector:
    matchLabels: { app: memory-pressure }
  template:
    metadata:
      labels: { app: memory-pressure }
    spec:
      containers:
        - name: stress
          image: polinux/stress:latest
          command: ["stress"]
          args: ["--vm", "1", "--vm-bytes", "245M", "--vm-keep"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
# 4) Requests/limits assenti: QoS BestEffort, primo candidato all'eviction.
#    → segnalazione "Requests assenti" / "Limits assenti".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: besteffort-worker
  namespace: demo-apps
  labels: { app: besteffort-worker }
spec:
  replicas: 1
  selector:
    matchLabels: { app: besteffort-worker }
  template:
    metadata:
      labels: { app: besteffort-worker }
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          # nessun blocco resources: QoS BestEffort di proposito
---
# 5) node-exporter: pod ESPLICITAMENTE abilitato a Prometheus (annotazioni
#    prometheus.io/scrape) — espone davvero /metrics su :9100 ed è scrapato dal
#    job kubernetes-pods. Volutamente sovradimensionato e quasi inattivo, così
#    è anche un caso di "sovradimensionato + inattivo".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-exporter
  namespace: demo-apps
  labels: { app: node-exporter }
spec:
  replicas: 1
  selector:
    matchLabels: { app: node-exporter }
  template:
    metadata:
      labels: { app: node-exporter }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args: ["--web.listen-address=:9100"]
          ports:
            - containerPort: 9100
              name: metrics
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
